<section class="glass-section animate-slideIn text-white">
  <section class="glass-section animate-slideIn text-white">
    <h1 class="text-3xl font-bold text-center mb-6">Experience</h1>

    <div *ngFor="let job of experiences"
         class="mb-6 p-6 rounded-xl
                bg-[rgba(10,25,47,0.2)] backdrop-blur-md
                border border-[rgba(100,255,218,0.1)]
                shadow-lg transition-all duration-300
                hover:-translate-y-2 hover:shadow-2xl hover:border-[rgba(100,255,218,0.3)]">

      <h2 class="text-xl font-semibold">
        {{ job.company }} - {{ job.role }}
      </h2>

      <p class="text-sm italic text-gray-300">
        {{ job.duration }}
      </p>

      <ul class="list-disc list-inside mt-3 space-y-1">
        <li *ngFor="let point of job.description">
          {{ point }}
        </li>
      </ul>
    </div>
  </section>
</section>
