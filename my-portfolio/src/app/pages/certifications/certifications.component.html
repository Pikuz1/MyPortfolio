<section class="glass-section text-white">
  <h1 class="text-3xl font-bold text-center mb-8">Certifications</h1>

  <div *ngFor="let cert of certifications"
       class="mb-4 p-5 rounded-xl
              bg-[rgba(10,25,47,0.2)] backdrop-blur-md
              border border-[rgba(100,255,218,0.1)]
              shadow-md transition-all duration-300
              hover:-translate-y-1 hover:shadow-xl">

    <h2 class="text-xl font-semibold mb-1">
      {{ cert.name }}
    </h2>

    <p class="text-sm text-gray-300">
      {{ cert.year }}
    </p>

  </div>
</section>
