<section class="glass-section text-white">
  <h1 class="text-3xl font-bold text-center mb-8">Projects</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <div *ngFor="let project of projects"
         class="p-5 rounded-xl
                bg-[rgba(10,25,47,0.2)] backdrop-blur-md
                border border-[rgba(100,255,218,0.1)]
                shadow-lg transition-all duration-300
                hover:-translate-y-2 hover:shadow-2xl hover:border-[rgba(100,255,218,0.3)]">

      <h2 class="text-xl font-semibold mb-1">
        {{ project.title }}
      </h2>

      <p class="text-sm italic text-gray-300 mb-3">
        {{ project.institution }}
      </p>

      <ul class="list-disc list-inside space-y-1 text-sm">
        <li *ngFor="let point of project.description">
          {{ point }}
        </li>
      </ul>

    </div>

  </div>
</section>
