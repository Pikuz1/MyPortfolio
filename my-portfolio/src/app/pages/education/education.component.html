<section class="glass-section text-white">
  <h1 class="text-3xl font-bold text-center mb-8">Education</h1>

  <div *ngFor="let edu of education"
       class="mb-5 p-5 rounded-xl
              bg-[rgba(10,25,47,0.2)] backdrop-blur-md
              border border-[rgba(100,255,218,0.1)]
              shadow-lg transition-all duration-300
              hover:shadow-xl hover:border-[rgba(100,255,218,0.25)]">

    <h2 class="text-xl font-semibold">
      {{ edu.school }}
    </h2>

    <p class="text-sm text-gray-300 mt-1">
      {{ edu.degree }} ({{ edu.year }})
    </p>

  </div>
</section>
