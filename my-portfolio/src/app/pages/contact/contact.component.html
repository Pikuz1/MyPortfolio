<section class="glass-section text-white animate-fadeIn">
  <h1 class="text-3xl font-bold text-center mb-8">Contact Me</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- Contact Details -->
    <div class="p-6 rounded-xl
                bg-[rgba(10,25,47,0.2)] backdrop-blur-md
                border border-[rgba(100,255,218,0.1)]
                shadow-md">

      <h2 class="text-2xl font-semibold mb-3">Get in Touch</h2>

      <p class="text-lg mt-2">
        Email:
        <a href="mailto:{{ contact.email }}"
           class="text-blue-400 hover:underline">
           {{ contact.email }}
        </a>
      </p>

      <p class="text-lg text-gray-300 mt-2">
        Location: {{ contact.address.location }}
      </p>
    </div>

    <!-- Map -->
    <div class="p-2 rounded-xl
                bg-[rgba(10,25,47,0.2)] backdrop-blur-md
                border border-[rgba(100,255,218,0.1)]
                shadow-md">

      <iframe
        class="w-full h-64 md:h-80 lg:h-96 rounded-lg"
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d42933.22469351866!2d10.264157779998873!3d47.736318603278555!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x479c7907da67c911%3A0xbca5bb95c833b02b!2sKempten!5e0!3m2!1sen!2sde!4v1738253394505!5m2!1sen!2sde"
        loading="lazy">
      </iframe>
    </div>
  </div>

  <!-- Contact Form -->
  <div class="max-w-lg mx-auto mt-10 p-6 rounded-2xl
              bg-[rgba(10,25,47,0.25)] backdrop-blur-lg
              border border-[rgba(100,255,218,0.1)]
              shadow-xl">

    <h2 class="text-2xl font-semibold text-center mb-6">
      Code, Coffee & Conversations ☕💻 <br> Let’s Connect!
    </h2>

    <form #contactForm="ngForm" (ngSubmit)="sendEmail(contactForm)">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-1">Name</label>
        <input type="text"
          class="w-full p-3 rounded-lg
                 bg-white/10 backdrop-blur-sm
                 border border-white/10
                 text-white placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-cyan-400"
          name="name" required ngModel placeholder="Your name">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
        <input type="email"
          class="w-full p-3 rounded-lg
                 bg-white/10 backdrop-blur-sm
                 border border-white/10
                 text-white placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-cyan-400"
          name="email" required ngModel placeholder="your@email.com">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-1">Message</label>
        <textarea
          class="w-full p-3 rounded-lg
                 bg-white/10 backdrop-blur-sm
                 border border-white/10
                 text-white placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-cyan-400"
          name="message" rows="4" required ngModel
          placeholder="Your message...">
        </textarea>
      </div>

      <button type="submit"
        class="w-full py-3 rounded-lg
               bg-gradient-to-r from-cyan-500 to-blue-600
               hover:from-cyan-400 hover:to-blue-500
               transition-all duration-300 shadow-lg hover:shadow-xl">
        Send Message
      </button>

    </form>
  </div>
</section>
